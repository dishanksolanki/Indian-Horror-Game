<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILENT HALLWAY — Room 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Georgia', serif; }
  #app { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }

  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
    margin: -3px 0 0 -3px; border-radius: 50%;
    background: rgba(255,255,255,0.6);
    box-shadow: 0 0 4px rgba(0,0,0,0.8);
    pointer-events: none; z-index: 5;
  }

  #interact-prompt {
    position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%);
    color: #d8d0c0; font-size: 18px; letter-spacing: 1px;
    text-shadow: 0 0 6px #000, 0 0 2px #000;
    opacity: 0; transition: opacity 0.25s ease; pointer-events: none; z-index: 5;
  }
  #interact-prompt.show { opacity: 1; }

  #vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 4;
    box-shadow: inset 0 0 180px 60px rgba(0,0,0,0.85);
  }

  #note-overlay {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); z-index: 20;
  }
  #note-overlay.show { display: flex; }
  #note-paper {
    width: 480px; max-width: 80vw; padding: 40px; background: #ece3cc;
    color: #2a2216; font-size: 19px; line-height: 1.6; box-shadow: 0 0 40px #000;
    transform: rotate(-1deg);
  }
  #note-paper h2 { margin-bottom: 14px; font-size: 22px; letter-spacing: 1px; }
  #note-hint { margin-top: 22px; font-size: 13px; opacity: 0.6; }

  #menu {
    position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background:
      radial-gradient(ellipse at center, #1a1512 0%, #000 80%);
    color: #cfc4a8; text-align: center;
  }
  #menu h1 {
    font-size: 46px; letter-spacing: 8px; font-weight: normal; margin-bottom: 6px;
    text-shadow: 0 0 18px rgba(180,20,20,0.6);
  }
  #menu p.sub { opacity: 0.55; letter-spacing: 3px; font-size: 13px; margin-bottom: 40px; }
  #play-btn {
    padding: 14px 46px; background: transparent; border: 1px solid #6b5f47; color: #e6dcc0;
    font-size: 16px; letter-spacing: 4px; cursor: pointer; font-family: inherit;
    transition: all 0.25s ease;
  }
  #play-btn:hover { background: #6b1414; border-color: #6b1414; color: #fff; }
  #controls-hint { margin-top: 30px; font-size: 12px; opacity: 0.4; letter-spacing: 1px; line-height: 1.8; }

  #hud {
    position: absolute; top: 16px; left: 16px; z-index: 5; color: #8a8070;
    font-size: 11px; letter-spacing: 2px; opacity: 0.5; pointer-events: none;
  }

  #fade {
    position: absolute; inset: 0; background: #000; z-index: 15; opacity: 0;
    pointer-events: none; transition: opacity 1.4s ease;
  }
  #fade.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <div id="vignette"></div>
  <div id="crosshair"></div>
  <div id="interact-prompt">[ E ] Interact</div>
  <div id="hud">ROOM 1 — THE HAVELI</div>
  <div id="fade"></div>

  <div id="note-overlay">
    <div id="note-paper">
      <h2 id="note-title">A Torn Page</h2>
      <div id="note-body">...</div>
      <div id="note-hint">Press [ E ] or [ ESC ] to close</div>
    </div>
  </div>

  <div id="menu">
    <h1>SILENT HALLWAY</h1>
    <p class="sub">R O O M &nbsp; O N E</p>
    <button id="play-btn">ENTER</button>
    <div id="controls-hint">
      WASD — Move &nbsp;|&nbsp; MOUSE — Look &nbsp;|&nbsp; SHIFT — Walk Softly<br>
      F — Flashlight &nbsp;|&nbsp; E — Interact &nbsp;|&nbsp; ESC — Pause
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="engine.js"></script>
<script type="module" src="room1.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
